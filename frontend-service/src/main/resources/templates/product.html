<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${product.name}">Product</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: header(${cartCount})}"></div>
<main>
    <div class="detail">
        <img th:src="${product.imageUrl}" th:alt="${product.name}"/>
        <div class="detail-body">
            <h1 th:text="${product.name}">Name</h1>
            <p class="price">$<span th:text="${product.price}">0.00</span></p>
            <p th:text="${product.description}">Description</p>
            <p class="stock" th:text="'In stock: ' + ${product.stock}">In stock: 0</p>
            <form th:action="@{/cart/add}" method="post">
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <label>Quantity:
                    <input type="number" name="quantity" value="1" min="1" max="10"/>
                </label>
                <button type="submit" class="btn primary">Add to cart</button>
            </form>
            <p><a th:href="@{/}">&larr; Continue shopping</a></p>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
